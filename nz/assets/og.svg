<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="g" cx="32%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="55%" stop-color="#333333"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(10,10,12,0)"/>
      <stop offset="100%" stop-color="rgba(10,10,12,0.55)"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#0a0a0c"/>
  <rect width="1200" height="630" fill="url(#g)" opacity="0.92"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- scanlines -->
  <g opacity="0.07">
    <rect x="0" y="0" width="1200" height="630" fill="url(#scanlines)"/>
  </g>

  <!-- classic disk UFO silhouette, upper-right -->
  <g transform="translate(880,180)" opacity="0.94">
    <ellipse cx="0" cy="40" rx="190" ry="38" fill="#e8e3d8"/>
    <path d="M -80 40 A 80 80 0 0 1 80 40 Z" fill="#e8e3d8"/>
    <ellipse cx="0" cy="60" rx="140" ry="14" fill="#0a0a0c" opacity="0.45"/>
    <rect x="-22" y="14" width="16" height="22" rx="2" fill="#0a0a0c"/>
    <rect x="6"   y="14" width="16" height="22" rx="2" fill="#0a0a0c"/>
    <circle cx="0" cy="68" r="10" fill="#5b8def"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="130" fill="#5b8def" font-family="JetBrains Mono, ui-monospace, monospace" font-size="20" font-weight="700" letter-spacing="6">REALUFO.ORG</text>

  <!-- name + tagline -->
  <text x="80" y="350" fill="#e8e3d8" font-family="Source Serif 4, Georgia, serif" font-size="84" font-weight="700" letter-spacing="-1">NZ · NZDF</text>
  <text x="80" y="410" fill="#e8e3d8" font-family="Source Serif 4, Georgia, serif" font-size="34" font-weight="400" opacity="0.78" font-style="italic">NZ Defence Force</text>

  <!-- bottom strip -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#e8e3d8" stroke-opacity="0.18"/>
  <text x="80" y="582" fill="#e8e3d8" font-family="JetBrains Mono, ui-monospace, monospace" font-size="18" font-weight="500" letter-spacing="3" opacity="0.86">◉ OFFICIAL GOVERNMENT UAP ARCHIVE</text>
  <text x="1120" y="582" fill="#5b8def" font-family="JetBrains Mono, ui-monospace, monospace" font-size="18" font-weight="700" letter-spacing="3" text-anchor="end">NZ</text>
</svg>
