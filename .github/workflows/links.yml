name: Broken-link check (lychee)

on:
  push:
    branches: [main]
    paths:
      - '**/*.html'
      - '.github/workflows/links.yml'
      - '.lycheeignore'
  pull_request:
    paths:
      - '**/*.html'
  schedule:
    - cron: '0 7 * * 1'      # Monday 07:00 UTC — catches link rot from upstream changes
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # --no-progress quiets the output.
          # --include-fragments validates #anchor targets exist in the page.
          # --exclude '^mailto:' skips mailto: links (replaces removed
          # --exclude-mail flag dropped in lychee v0.20+).
          # --root-dir resolves root-relative hrefs like /manifest.webmanifest
          # against the repo checkout instead of the runner filesystem root.
          # Requires absolute path (lychee v0.23 hard-rejects relative).
          args: >-
            --no-progress
            --cache
            --max-cache-age 7d
            --include-fragments
            --root-dir
            ${{ github.workspace }}
            --exclude
            ^mailto:
            --accept 200,206,301,302,308,403,429
            --timeout 20
            --max-concurrency 8
            ./**/*.html
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}
