name: Footer drift gate

on:
  push:
    branches: [main]
    paths:
      - '**/*.html'
      - 'scripts/_site_template.py'
      - 'scripts/sync-footer.py'
  pull_request:
    paths:
      - '**/*.html'
      - 'scripts/_site_template.py'
      - 'scripts/sync-footer.py'
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Verify footer is canonical
        run: python3 scripts/sync-footer.py --check
