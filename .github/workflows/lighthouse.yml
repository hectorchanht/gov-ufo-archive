name: Lighthouse CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/lighthouse.yml'
      - '.lighthouserc.json'
  pull_request:
    paths:
      - 'src/**'
      - 'public/**'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version intentionally omitted — see deploy-cf-pages.yml note;
        # packageManager: pnpm@9.15.9 in package.json drives the version.

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Astro site
        run: pnpm build

      - name: Serve built dist/
        run: |
          # Serve the Astro build output, not the repo root (Phase 4 migration:
          # repo root no longer has index.html — it lives in src/pages/index.astro
          # and ships to dist/ via pnpm build). 2026-05-29 fix.
          cd dist && python3 -m http.server 8000 &
          for i in $(seq 1 30); do
            curl -fs http://localhost:8000/ > /dev/null && break
            sleep 1
          done

      - name: Run Lighthouse CI
        # 2026-05-29 — switched from `npm install --no-save @lhci/cli@0.14.x`
        # + `npx lhci autorun` to a single `pnpm dlx`. The npm path broke
        # with "Cannot read properties of null (reading 'matches')" on
        # Node 22 + npm 11 (known npm regression installing @lhci/cli 0.14
        # in --no-save mode). pnpm dlx fetches the package into pnpm's
        # store and executes cleanly. Pinned to 0.14.x latest to track
        # security patches without breaking on a 0.15 major.
        run: pnpm dlx @lhci/cli@^0.14 autorun --config=.lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
