name: Weekly archive scrape + rebuild + API

on:
  schedule:
    - cron: '0 6 * * 1'   # Monday 06:00 UTC
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  scrape-and-rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (curl_cffi for Akamai-fronted hosts)
        run: pip install --upgrade pip && pip install curl_cffi || true

      - name: Run scrapers (failures tolerated)
        run: |
          python3 scripts/scrape-nasa.py   || true
          python3 scripts/scrape-nara.py   || true
          python3 scripts/scrape-aaro.py   || true
          python3 scripts/scrape-geipan.py || true
          python3 scripts/scrape-uk.py     || true
          python3 scripts/scrape-brazil.py || true
          python3 scripts/scrape-chile.py  || true
          python3 scripts/harvest-tna.py   || true
          python3 scripts/spider.py chile-sefaa || true

      - name: Rebuild all archive HTML
        run: |
          python3 scripts/build-nasa.py && \
          python3 scripts/build-nara.py && \
          python3 scripts/build-aaro.py && \
          python3 scripts/build-geipan.py && \
          python3 scripts/build-uk.py && \
          python3 scripts/build-brazil.py && \
          python3 scripts/build-chile.py && \
          python3 scripts/build_batch3.py && \
          python3 scripts/build-details.py && \
          python3 scripts/build-wargov.py

      - name: Regenerate static API dump
        run: python3 scripts/build-api.py

      - name: Run dead-source health check (informational, never fails the build)
        run: python3 scripts/check-sources.py || true

      - name: Update sitemap lastmod
        run: |
          DATE=$(date -u +%Y-%m-%d)
          sed -i "s#<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}</lastmod>#<lastmod>${DATE}</lastmod>#g" sitemap.xml

      - name: Commit rebuilt artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "*/index.html" "aaro/details.html" "index.html" \
                  "api/" "sitemap.xml" "dead-links.json" "dead-links.md" \
                  "geipan/cases.json" || true
          git diff --cached --quiet || git commit -m "chore: weekly auto-rebuild [skip ci]"

      - name: Push to main
        run: git push origin main || true
