name: Nav drift gate

on:
  push:
    branches: [main]
    paths:
      - '**/*.html'
      - 'scripts/_site_template.py'
      - 'scripts/sync-nav.py'
  pull_request:
    paths:
      - '**/*.html'
      - 'scripts/_site_template.py'
      - 'scripts/sync-nav.py'
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Verify nav is canonical across all HTML files
        run: |
          python3 scripts/sync-nav.py --check
          # On drift: re-run without --check to see what would change, then fail.
